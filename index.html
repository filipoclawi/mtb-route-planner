<!doctype html>
<html><head><meta charset="utf-8"><title>POC Alp Clünas access route</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>body{font-family:system-ui;margin:0} header{padding:1rem} #map{height:70vh} .warn{color:#9a5b00} table{border-collapse:collapse;margin:1rem} td,th{border:1px solid #ddd;padding:.35rem .5rem}</style>
</head><body><header><h1>POC Alp Clünas access route</h1><p>Local placeholder viewer. Connector sections are blue; source trail sections are green.</p><p><a href="unified_route.gpx">Download GPX</a> · <a href="unified_route.geojson">GeoJSON</a> · <a href="route_analysis.json">Analysis JSON</a></p></header><div id="map"></div><div id="summary"></div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
fetch('viewer_data.json').then(r=>r.json()).then(data=>{
  const pts=data.points.map(p=>[p.lat,p.lon]);
  const map=L.map('map');
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {maxZoom:19, attribution:'© OpenStreetMap'}).addTo(map);
  const bySec={}; for (const p of data.points) { (bySec[p.section_id] ||= []).push([p.lat,p.lon]); }
  for (const sec of data.sections) { L.polyline(bySec[sec.id]||[], {color: sec.type.includes('connector') ? '#1f78b4' : '#33a02c', weight:5}).addTo(map).bindPopup(sec.name); }
  L.circleMarker(pts[0], {radius:7,color:'#111'}).addTo(map).bindPopup('Start');
  L.circleMarker(pts[pts.length-1], {radius:7,color:'#b22222'}).addTo(map).bindPopup('Finish');
  map.fitBounds(L.latLngBounds(pts), {padding:[20,20]});
  document.getElementById('summary').innerHTML = `<table><tr><th>Section</th><th>Type</th><th>Distance</th><th>Points</th></tr>${data.sections.map(s=>`<tr><td>${s.name}</td><td>${s.type}</td><td>${(s.distance_m/1000).toFixed(2)} km</td><td>${s.point_count}</td></tr>`).join('')}</table>` + (data.warnings.length ? `<p class="warn">Warnings: ${data.warnings.join('; ')}</p>` : '');
});
</script></body></html>
